<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Pajaro — Show</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/show.css" />
</head>
<body>

<!-- ==================== BACKDROP ==================== -->
<div class="halftone"></div>
<div class="banner-top">
  <h1 class="banner-title"><span class="cuba">CUBA</span> <span class="amp">·</span> <span class="pr">PUERTO RICO</span></h1>
  <div class="banner-sub">El Pajaro · Las dos alas · Un solo corazon</div>
</div>

<!-- ==================== STAGE: pajaro + bracket ==================== -->
<div id="stage" class="stage">

  <!-- Pajaro SVG: silueta heraldica de un solo trazo (cuerpo + alas + cola
       en un mismo path para que lea como UNA criatura). Cabeza/ojo/pico/
       corazon van encima como capas separadas. -->
  <svg id="bird" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" aria-hidden="true">

    <!-- 1) Silueta principal (alas + cuerpo + cola, todo un trazo) -->
    <path class="bird-silhouette" d="
      M 800 320
      C 770 320, 740 340, 720 380
      Q 600 250, 400 240
      Q 180 240, 60 380
      Q 100 460, 240 520
      Q 380 570, 540 600
      Q 660 620, 720 640
      L 740 720
      L 760 770
      L 790 740
      L 800 770
      L 810 740
      L 840 770
      L 860 720
      L 880 640
      Q 940 620, 1060 600
      Q 1220 570, 1360 520
      Q 1500 460, 1540 380
      Q 1420 240, 1200 240
      Q 1000 250, 880 380
      C 860 340, 830 320, 800 320
      Z" />

    <!-- 2) Plumas (lineas decorativas curvas, simetricas) -->
    <g class="feather-lines">
      <path d="M 720 400 Q 540 380, 280 410" />
      <path d="M 720 440 Q 520 440, 240 470" />
      <path d="M 720 490 Q 540 510, 320 540" />
      <path d="M 720 540 Q 580 565, 440 590" />
      <path d="M 880 400 Q 1060 380, 1320 410" />
      <path d="M 880 440 Q 1080 440, 1360 470" />
      <path d="M 880 490 Q 1060 510, 1280 540" />
      <path d="M 880 540 Q 1020 565, 1160 590" />
    </g>

    <!-- 3) Cabeza (encima del cuerpo) -->
    <ellipse class="bird-head" cx="800" cy="240" rx="62" ry="70" />

    <!-- 4) Pico (apunta hacia abajo desde la cabeza) -->
    <path class="bird-beak" d="M 800 310 L 820 345 Q 800 360, 780 345 Z" />

    <!-- 5) Ojos (uno solo, lado izq como vista 3/4) -->
    <circle class="bird-eye" cx="785" cy="225" r="6" />
    <circle class="bird-eye-shine" cx="787" cy="222" r="2" />

    <!-- 7) Corazon en el pecho (donde queda el campeon) -->
    <g id="heart" class="heart" transform="translate(800 460)">
      <path d="M 0 18
               C -25 -8, -38 -3, -38 -18
               A 18 18 0 0 1 0 -22
               A 18 18 0 0 1 38 -18
               C 38 -3, 25 -8, 0 18 Z" />
    </g>

  </svg>

  <!-- Capa absoluta donde se monta el bracket. Las posiciones de cada match
       las pone show.js en base al layout fijo (4 rondas). -->
  <div id="bracket-layer" class="bracket-layer"></div>

  <!-- Conexiones SVG entre matches (lineas que se iluminan al avanzar). -->
  <svg id="bracket-lines" class="bracket-lines" viewBox="0 0 1600 900" preserveAspectRatio="none"></svg>
</div>

<!-- ==================== MATCH MODAL ====================
     Aparece cuando hay currentMatch. Se transforma segun phase. -->
<div id="match-modal" class="match-modal hidden">
  <div class="modal-inner">
    <div class="phase-tag" id="phase-tag">PREVIEW</div>

    <div class="versus">
      <div class="contender" id="contender-left">
        <div class="contender-photo"><img id="left-photo" alt="" /></div>
        <div class="contender-info">
          <div class="contender-flag flag-cuba" id="left-flag">CUBA</div>
          <h2 class="contender-name" id="left-name">—</h2>
          <p class="contender-bio" id="left-bio"></p>
          <div class="contender-vote-cmd">!1 · <strong>cuba</strong></div>
        </div>
        <div class="clip-player" id="left-clip-wrap"></div>
        <div class="vote-bar-wrap">
          <div class="vote-bar-stack" id="left-bar">
            <div class="vote-bar-cuba" style="width:0%"></div>
            <div class="vote-bar-pr"   style="width:0%"></div>
          </div>
          <div class="vote-totals">
            <span class="t-cuba">cuba: <span id="left-cuba-count">0</span></span>
            <span class="t-pr">pr: <span id="left-pr-count">0</span></span>
            <span class="t-total">TOTAL: <span id="left-total-count">0</span></span>
          </div>
        </div>
      </div>

      <div class="vs-mark">VS</div>

      <div class="contender" id="contender-right">
        <div class="contender-photo"><img id="right-photo" alt="" /></div>
        <div class="contender-info">
          <div class="contender-flag flag-pr" id="right-flag">PR</div>
          <h2 class="contender-name" id="right-name">—</h2>
          <p class="contender-bio" id="right-bio"></p>
          <div class="contender-vote-cmd">!2 · <strong>pr</strong></div>
        </div>
        <div class="clip-player" id="right-clip-wrap"></div>
        <div class="vote-bar-wrap">
          <div class="vote-bar-stack" id="right-bar">
            <div class="vote-bar-cuba" style="width:0%"></div>
            <div class="vote-bar-pr"   style="width:0%"></div>
          </div>
          <div class="vote-totals">
            <span class="t-cuba">cuba: <span id="right-cuba-count">0</span></span>
            <span class="t-pr">pr: <span id="right-pr-count">0</span></span>
            <span class="t-total">TOTAL: <span id="right-total-count">0</span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="vote-timer" id="vote-timer-wrap">
      <div class="vote-timer-label">VOTAR EN EL CHAT · <strong>!1</strong> o <strong>!2</strong></div>
      <div class="vote-timer-bar"><div class="vote-timer-fill" id="vote-timer-fill"></div></div>
      <div class="vote-timer-text" id="vote-timer-text">--</div>
    </div>

    <div class="result-banner hidden" id="result-banner">
      <span class="banner-bang">¡GANADOR!</span>
      <span id="winner-name">—</span>
    </div>

    <!-- Lluvia de nombres flotantes con cada voto (decorativo) -->
    <div class="vote-rain" id="vote-rain"></div>
  </div>
</div>

<!-- ==================== STATUS BAR (debug discreto) ==================== -->
<div class="status-bar" id="status-bar">
  <span class="dot dot-cuba" id="dot-cuba"></span> CUBA
  <span class="dot dot-pr" id="dot-pr"></span> PR
  <span class="ws-status" id="ws-status">conectando…</span>
</div>

<script src="/js/show.js"></script>
</body>
</html>
